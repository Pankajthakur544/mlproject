<!DOCTYPE html>
<html>
    <head>
        <style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    cursor: none;
}

.login{
    background:white;
    padding:40px;
    width:420px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

select,
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input[type="submit"]{
    background:#667eea;
    color:white;
    font-size:16px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

input[type="submit"]:hover{
    background:#764ba2;
}

</style>
    </head>
<body>

<div class="login" style="cursor: none;">
<h1>Student Exam Performance Indicator</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<h2>Student Exam Performance Prediction</h2>

<label>Gender</label>
<select name="gender" required>
<option selected disabled value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<br><br>

<label>Race or Ethnicity</label>
<select name="race_ethnicity" required>
<option selected disabled value="">Select Ethnicity</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<br><br>

<label>Parental Level of Education</label>
<select name="parental_level_of_education" required>
<option selected disabled value="">Select Parent Education</option>
<option value="associate's degree">associate's degree</option>
<option value="bachelor's degree">bachelor's degree</option>
<option value="high school">high school</option>
<option value="master's degree">master's degree</option>
<option value="some college">some college</option>
<option value="some high school">some high school</option>
</select>

<br><br>

<label>Lunch Type</label>
<select name="lunch" required>
<option selected disabled value="">Select Lunch</option>
<option value="free/reduced">free/reduced</option>
<option value="standard">standard</option>
</select>

<br><br>

<label>Test Preparation Course</label>
<select name="test_preparation_course" required>
<option selected disabled value="">Select Course</option>
<option value="none">none</option>
<option value="completed">completed</option>
</select>

<br><br>

<label>Reading Score</label>
<input type="number" name="reading_score" placeholder="Reading Score" required>

<br><br>

<label>Writing Score</label>
<input type="number" name="writing_score" placeholder="Writing Score" required>

<br><br>

<input type="submit" value="Predict Maths Score">

</form>

<h2>
 the prediction is {{ results }}
</h2>

</div>

</body>
</html>
